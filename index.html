<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustAII | Law Engine v2.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .loader { border: 3px solid rgba(59, 130, 246, 0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center p-6 md:p-12 min-h-screen">

    <header class="w-full max-w-4xl flex justify-between items-center mb-16 border-b border-white/5 pb-8">
        <h1 class="text-3xl font-black italic text-blue-500 uppercase tracking-tighter">JUSTAII</h1>
        <div class="bg-blue-600/20 px-6 py-2 rounded-2xl border border-blue-500/30 text-[10px] font-bold">
            CRÉDITOS: <span id="c-display">--</span>
        </div>
    </header>

    <main class="w-full max-w-4xl space-y-10">
        <section class="glass p-8 rounded-[2.5rem]">
            <textarea id="p-input" class="w-full h-64 bg-transparent border-none outline-none text-lg resize-none text-slate-200" placeholder="Introduza os factos do caso..."></textarea>
            <div class="p-6 flex justify-between items-center border-t border-white/5 mt-4">
                <span id="st" class="text-[9px] font-bold text-green-500 uppercase tracking-widest">Motor Online</span>
                <button onclick="executar()" id="p-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-12 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all shadow-xl shadow-blue-600/20">
                    Analisar Factos
                </button>
            </div>
        </section>

        <div id="p-ld" class="hidden flex flex-col items-center py-10">
            <div class="loader mb-4"></div>
            <p class="text-[10px] uppercase font-bold text-blue-400 animate-pulse tracking-widest">A aguardar resposta dos agentes...</p>
        </div>

        <div id="p-res" class="space-y-6 pb-40 w-full"></div>
    </main>

    <script>
        // COLOQUE AQUI O SEU LINK DO RENDER (SEM A PORTA :5000)
        const API_URL = "https://jusaii-app.onrender.com/api/analyze";
        
        let credits = parseInt(localStorage.getItem('j_v29_c') || "5");
        const update = () => { document.getElementById('c-display').innerText = credits; localStorage.setItem('j_v29_c', credits); }
        update();

        async function executar() {
            if(credits <= 0) return alert("Ciclos insuficientes.");
            const input = document.getElementById('p-input').value.trim();
            if(!input) return;

            const btn = document.getElementById('p-btn');
            const ld = document.getElementById('p-ld');
            const res = document.getElementById('p-res');

            btn.disabled = true;
            ld.classList.remove('hidden');

            try {
                const r = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: input })
                });

                if (!r.ok) throw new Error("Erro de resposta");

                const d = await r.json();

                if(d.agents) {
                    credits--; update();
                    d.agents.forEach(a => {
                        const card = document.createElement('div');
                        card.className = "glass p-10 rounded-[3rem] border-l-4 border-blue-600 mb-6 w-full";
                        card.innerHTML = `<h3 class="text-blue-400 font-bold mb-4 uppercase text-[10px] tracking-widest">${a.area}</h3>
                                         <div class="text-slate-300 text-sm leading-relaxed">${a.analysis.replace(/\n/g, '<br>')}</div>`;
                        res.prepend(card);
                    });
                    document.getElementById('p-input').value = "";
                }
            } catch (e) {
                alert("O servidor está a acordar (Cold Start). Aguarde 20 segundos e tente novamente.");
            } finally {
                btn.disabled = false;
                ld.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
