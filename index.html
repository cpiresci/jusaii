<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustAII | Motor Jurídico 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .credit-badge { background: linear-gradient(90deg, #1e3a8a, #3b82f6); border: 1px solid #60a5fa; box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .modal-bg { background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(15px); }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 50% { opacity: 0.5; } 100% { top: 100%; opacity: 0; } }
        .scanning::after { content: ""; position: absolute; width: 100%; height: 2px; background: #3b82f6; left: 0; animation: scan 2s infinite linear; box-shadow: 0 0 15px #3b82f6; }
        .locked-visual { filter: grayscale(100%) blur(4px); pointer-events: none; opacity: 0.3; transition: all 0.5s ease; }
    </style>
</head>
<body class="flex flex-col items-center p-4 md:p-12 relative">

    <!-- Header -->
    <header class="w-full max-w-5xl flex justify-between items-center mb-12 border-b border-white/5 pb-6">
        <div>
            <h1 class="text-3xl font-extrabold italic tracking-tighter text-blue-500 uppercase">JustAII</h1>
            <p class="text-[9px] opacity-40 uppercase tracking-[0.4em] font-bold">Mechanical Authority</p>
        </div>
        <div class="flex items-center gap-3">
            <div class="credit-badge px-5 py-2 rounded-full flex items-center gap-2">
                <span class="text-[9px] font-bold uppercase opacity-70">Créditos:</span>
                <span id="credit-count" class="font-black text-white text-base">--</span>
            </div>
        </div>
    </header>

    <main class="w-full max-w-4xl space-y-10">
        <!-- Input Section -->
        <section class="glass-panel rounded-[2.5rem] p-2 transition-all duration-700" id="main-panel">
            <div class="relative rounded-[2rem] overflow-hidden bg-slate-900/50" id="inputContainer">
                <textarea id="prompt" class="w-full h-64 p-8 bg-transparent border-none outline-none text-base leading-relaxed placeholder:opacity-20 resize-none" placeholder="Descreva os factos jurídicos para análise..."></textarea>
            </div>
            <div class="p-5 flex justify-between items-center">
                <span class="text-[10px] text-slate-500 font-mono">Custo: 1 Crédito / Análise</span>
                <button onclick="analisar()" id="btn" class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] transition-all transform active:scale-95 shadow-lg shadow-blue-600/30">
                    Iniciar Orquestração
                </button>
            </div>
        </section>

        <!-- Resultados -->
        <section id="output" class="space-y-8 pb-32"></section>
    </main>

    <!-- Paywall Modal -->
    <div id="paywall-modal" class="fixed inset-0 modal-bg z-[100] flex items-center justify-center hidden transition-all duration-300">
        <div class="glass-panel p-10 rounded-[3rem] max-w-md w-[90%] text-center border-t-4 border-blue-500 shadow-2xl">
            <div class="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <h2 class="text-2xl font-black mb-2">Energia Esgotada</h2>
            <p class="text-sm text-slate-400 mb-8">O motor SambaNova requer créditos para processar a orquestração jurídica.</p>
            
            <div class="space-y-3">
                <button onclick="comprarCreditos(10)" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all">
                    Pack 10 Análises - R$ 49,90
                </button>
                <button onclick="comprarCreditos(50)" class="w-full bg-slate-800 hover:bg-slate-700 text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all border border-white/5">
                    Pack 50 Análises - R$ 199,90
                </button>
                <button onclick="fecharPaywall()" class="w-full py-2 text-[9px] text-slate-600 uppercase tracking-[0.3em] hover:text-white transition-colors">Fechar / Voltar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://jusaii-app.onrender.com/api/analyze";
        
        // --- LÓGICA DE CRÉDITOS ---
        let creditos = localStorage.getItem('jusaii_creditos');
        
        // Correção de travamento: Se for null ou undefined, garante créditos iniciais
        if (creditos === null || creditos === undefined) {
            creditos = 2;
            localStorage.setItem('jusaii_creditos', 2);
        } else {
            creditos = parseInt(creditos);
        }

        // Atualização inicial
        atualizarUI();

        function salvarCreditos(valor) {
            creditos = valor;
            localStorage.setItem('jusaii_creditos', valor);
            atualizarUI();
        }

        function atualizarUI() {
            document.getElementById('credit-count').innerText = creditos;
            const panel = document.getElementById('main-panel');
            
            if (creditos <= 0) {
                panel.classList.add('locked-visual');
                document.getElementById('paywall-modal').classList.remove('hidden');
            } else {
                panel.classList.remove('locked-visual');
                document.getElementById('paywall-modal').classList.add('hidden');
            }
        }

        async function analisar() {
            if (creditos <= 0) {
                document.getElementById('paywall-modal').classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('btn');
            const container = document.getElementById('inputContainer');
            const output = document.getElementById('output');
            const prompt = document.getElementById('prompt').value.trim();

            if(!prompt) return alert("Descreva o caso.");

            btn.disabled = true;
            btn.innerText = "A PROCESSAR...";
            container.classList.add('scanning');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (!response.ok) throw new Error('Erro no servidor');

                const data = await response.json();
                
                if(data.agents) {
                    salvarCreditos(creditos - 1);
                    data.agents.forEach(a => {
                        const card = document.createElement('div');
                        card.className = "glass-panel p-10 rounded-[3rem] border-l-4 border-blue-500 mb-6";
                        card.innerHTML = `<h3 class="text-blue-400 font-bold mb-4 text-[10px] uppercase tracking-widest">${a.area}</h3>
                                          <div class="text-sm opacity-90 leading-relaxed text-slate-200">${a.analysis.replace(/\n/g, '<br>')}</div>`;
                        output.prepend(card);
                    });
                }
            } catch (error) {
                alert("O motor está a acordar. Tente novamente em 20 segundos.");
            } finally {
                btn.disabled = false;
                btn.innerText = "INICIAR ORQUESTRAÇÃO";
                container.classList.remove('scanning');
            }
        }

        function fecharPaywall() {
            document.getElementById('paywall-modal').classList.add('hidden');
        }

        function comprarCreditos(qtd) {
            // Simulação de compra para o dono testar
            alert("Simulando processamento de pagamento...");
            salvarCreditos(creditos + qtd);
            fecharPaywall();
        }
    </script>
</body>
</html>
