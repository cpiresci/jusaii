<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustAII | Law Engine v2.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .credit-badge { background: linear-gradient(90deg, #1e3a8a, #3b82f6); border: 1px solid #60a5fa; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .scanning::after { content: ""; position: absolute; width: 100%; height: 2px; background: #3b82f6; left: 0; animation: scan 2s infinite linear; box-shadow: 0 0 15px #3b82f6; z-index: 10; }
        .loader { border: 3px solid rgba(59, 130, 246, 0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center p-6 md:p-12">

    <header class="w-full max-w-5xl flex justify-between items-center mb-16 border-b border-white/5 pb-8">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter text-blue-500 uppercase">JustAII</h1>
            <p class="text-[9px] opacity-40 uppercase tracking-[0.4em] font-bold">Mechanical Authority • v2.8</p>
        </div>
        <div class="credit-badge px-6 py-2 rounded-2xl flex items-center gap-3">
            <span class="text-[10px] font-bold uppercase tracking-widest opacity-70">Créditos:</span>
            <span id="credit-count" class="font-black text-white text-lg">--</span>
        </div>
    </header>

    <main class="w-full max-w-4xl space-y-10">
        <section class="glass rounded-[2.5rem] p-2 relative" id="input-section">
            <div id="scanner" class="hidden scanning"></div>
            <div class="rounded-[2rem] overflow-hidden bg-black/40">
                <textarea id="prompt" class="w-full h-72 p-10 bg-transparent border-none outline-none text-lg leading-relaxed placeholder:opacity-20 resize-none text-white" placeholder="Descreva os factos para análise jurídica..."></textarea>
            </div>
            <div class="p-6 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span id="status" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Motor Online</span>
                </div>
                <button onclick="analisar()" id="btn" class="bg-blue-600 hover:bg-blue-500 text-white px-12 py-5 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] transition-all transform active:scale-95 shadow-xl shadow-blue-600/30">
                    Iniciar Orquestração
                </button>
            </div>
        </section>

        <div id="loading" class="hidden flex flex-col items-center py-10 space-y-4">
            <div class="loader"></div>
            <p class="text-[10px] uppercase tracking-[0.3em] text-blue-400 animate-pulse font-bold">A processar agentes jurídicos...</p>
        </div>

        <section id="results" class="space-y-8 pb-40"></section>
    </main>

    <script>
        // MUDAR PARA O SEU LINK DO RENDER (Sem a barra final e SEM porta :5000)
        const API_URL = "https://jusaii-app.onrender.com/api/analyze";
        
        let credits = parseInt(localStorage.getItem('justaii_credits_final') || "5");
        document.getElementById('credit-count').innerText = credits;

        async function analisar() {
            if (credits <= 0) return alert("Ciclos de energia esgotados.");
            
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) return alert("Por favor, introduza os factos.");

            const btn = document.getElementById('btn');
            const loading = document.getElementById('loading');
            const scanner = document.getElementById('scanner');
            const status = document.getElementById('status');
            const results = document.getElementById('results');

            btn.disabled = true;
            loading.classList.remove('hidden');
            scanner.classList.remove('hidden');
            status.innerText = "Em Orquestração...";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (!response.ok) throw new Error("Timeout/Error");

                const data = await response.json();

                if (data.agents) {
                    credits--;
                    localStorage.setItem('justaii_credits_final', credits);
                    document.getElementById('credit-count').innerText = credits;

                    data.agents.forEach(a => {
                        const card = document.createElement('div');
                        card.className = "glass p-12 rounded-[3.5rem] border-l-4 border-blue-600 mb-6";
                        card.innerHTML = `<h3 class="text-blue-400 font-black mb-6 text-[10px] uppercase tracking-widest">${a.area}</h3>
                                          <div class="text-slate-200 leading-relaxed text-sm">${a.analysis.replace(/\n/g, '<br>')}</div>`;
                        results.prepend(card);
                    });
                    document.getElementById('prompt').value = "";
                }
            } catch (error) {
                alert("O motor está a acordar (Plano Gratuito do Render). Aguarde 30 segundos e tente de novo.");
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
                scanner.classList.add('hidden');
                status.innerText = "Motor Online";
            }
        }
    </script>
</body>
</html>
