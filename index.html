<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustAII | Law Engine v2.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .loader { border: 3px solid rgba(59, 130, 246, 0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center p-6 md:p-12">

    <header class="w-full max-w-5xl flex justify-between items-center mb-12 border-b border-white/5 pb-8">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter text-blue-500 uppercase">JustAII</h1>
            <p class="text-[9px] opacity-40 uppercase tracking-[0.4em] font-bold italic">SambaNova Orchestration</p>
        </div>
        <div class="bg-blue-600/20 px-6 py-2 rounded-2xl border border-blue-500/30">
            <span class="text-[10px] font-bold opacity-60 mr-2 uppercase">Ciclos:</span>
            <span id="c-count" class="font-black text-white italic text-lg">--</span>
        </div>
    </header>

    <main class="w-full max-w-4xl space-y-10">
        <section class="glass rounded-[2.5rem] p-2 relative overflow-hidden">
            <textarea id="txt-input" class="w-full h-72 p-10 bg-transparent border-none outline-none text-lg leading-relaxed placeholder:opacity-20 resize-none text-white" placeholder="Descreva os factos ou o caso jurídico..."></textarea>
            <div class="p-6 flex justify-between items-center border-t border-white/5">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span id="st-msg" class="text-[9px] uppercase font-bold text-slate-500 tracking-widest">Motor Sincronizado</span>
                </div>
                <button onclick="analisar()" id="btn-main" class="bg-blue-600 hover:bg-blue-500 text-white px-12 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all shadow-xl shadow-blue-600/20 active:scale-95">
                    Iniciar Análise
                </button>
            </div>
        </section>

        <div id="loading-box" class="hidden flex flex-col items-center py-10 space-y-4">
            <div class="loader"></div>
            <p class="text-[10px] uppercase tracking-widest text-blue-400 animate-pulse font-bold">Consultando Agentes Jurídicos...</p>
        </div>

        <div id="output-area" class="space-y-6 pb-40"></div>
    </main>

    <script>
        // URL DO RENDER - SEM A PORTA 5000 NO FINAL
        const API_URL = "https://jusaii-app.onrender.com/api/analyze";
        
        let credits = parseInt(localStorage.getItem('j_v29_final_c') || "5");
        const sync = () => { 
            document.getElementById('c-count').innerText = credits; 
            localStorage.setItem('j_v29_final_c', credits); 
        }
        sync();

        async function analisar() {
            if(credits <= 0) return alert("Limite de créditos atingido.");
            
            const prompt = document.getElementById('txt-input').value.trim();
            if(!prompt) return alert("Por favor, introduza um texto.");

            const btn = document.getElementById('btn-main');
            const loader = document.getElementById('loading-box');
            const status = document.getElementById('st-msg');
            const out = document.getElementById('output-area');

            btn.disabled = true;
            loader.classList.remove('hidden');
            status.innerText = "Em processamento...";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (!response.ok) throw new Error("Erro de ligação");

                const data = await response.json();

                if(data.agents) {
                    credits--;
                    sync();
                    data.agents.forEach(a => {
                        const card = document.createElement('div');
                        card.className = "glass p-10 rounded-[3rem] border-l-4 border-blue-600 animate-in fade-in duration-500";
                        card.innerHTML = `<h3 class="text-blue-400 font-bold mb-4 text-[10px] uppercase tracking-widest italic">${a.area}</h3>
                                         <div class="text-slate-300 text-sm leading-relaxed">${a.analysis.replace(/\n/g, '<br>')}</div>`;
                        out.prepend(card);
                    });
                    document.getElementById('txt-input').value = "";
                }
            } catch (error) {
                alert("O servidor está a acordar (Cold Start). Tente novamente em 20 segundos.");
                console.error(error);
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
                status.innerText = "Motor Online";
            }
        }
    </script>
</body>
</html>
