<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustAII | Orquestração Jurídica Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .loader { border: 3px solid rgba(59, 130, 246, 0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in-card { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .veredito-box { background: linear-gradient(135deg, rgba(59,130,246,0.2) 0%, rgba(37,99,235,0.1) 100%); border-left: 4px solid #3b82f6; }
        .error-message { background: rgba(220, 38, 38, 0.2); border-left: 4px solid #ef4444; padding: 1rem; border-radius: 0.5rem; color: #fecaca; }
        details summary { cursor: pointer; font-weight: 600; color: #60a5fa; }
        .btn-premium { background: linear-gradient(135deg, #f59e0b, #d97706); }
    </style>
</head>
<body class="flex flex-col items-center p-6 md:p-12">

    <header class="w-full max-w-5xl flex justify-between items-center mb-12 border-b border-white/5 pb-8">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter text-blue-500 uppercase">JustAII</h1>
            <p class="text-[9px] opacity-40 uppercase tracking-[0.4em] font-bold italic">Orquestração Ultra Avançada</p>
        </div>
        <div id="user-info" class="flex gap-4 items-center">
            <div id="credits" class="bg-blue-600/20 px-6 py-2 rounded-2xl border border-blue-500/30">
                <span class="text-[10px] font-bold opacity-60 mr-2 uppercase">Créditos:</span>
                <span id="c-count" class="font-black text-white italic text-lg">--</span>
                <span class="text-[10px] font-bold opacity-60 mx-2">| Premium:</span>
                <span id="p-count" class="font-black text-white italic text-lg">--</span>
            </div>
            <div id="auth-buttons">
                <button onclick="showLogin()" class="text-sm bg-white/10 px-4 py-2 rounded-xl hover:bg-white/20">Login</button>
                <button onclick="showRegister()" class="text-sm bg-blue-600 px-4 py-2 rounded-xl ml-2">Registrar</button>
            </div>
            <div id="logout-button" style="display:none;">
                <button onclick="logout()" class="text-sm bg-red-600/20 px-4 py-2 rounded-xl">Sair</button>
            </div>
        </div>
    </header>

    <main class="w-full max-w-4xl space-y-10">
        <!-- Área de Input -->
        <section class="glass rounded-[2.5rem] p-2 relative overflow-hidden shadow-2xl">
            <textarea id="txt-input" class="w-full h-72 p-10 bg-transparent border-none outline-none text-lg leading-relaxed placeholder:opacity-20 resize-none text-white" placeholder="Descreva aqui os factos do caso..."></textarea>
            <div class="p-6 flex flex-col md:flex-row justify-between items-center border-t border-white/5 gap-4">
                <div class="flex items-center gap-2">
                    <div id="status-dot" class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span id="st-msg" class="text-[10px] uppercase font-bold text-slate-500 tracking-widest">Motor Online</span>
                </div>
                <div class="flex gap-3">
                    <button onclick="analisarCaso('free')" id="btn-free" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all disabled:opacity-50">
                        Análise Gratuita
                    </button>
                    <button onclick="analisarCaso('premium')" id="btn-premium" class="btn-premium hover:opacity-90 text-white px-8 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all disabled:opacity-50">
                        Relatório Premium (R$ 19,90)
                    </button>
                </div>
            </div>
        </section>

        <div id="loading-box" class="hidden flex flex-col items-center py-10 space-y-4">
            <div class="loader"></div>
            <p class="text-[10px] uppercase tracking-widest text-blue-400 animate-pulse font-bold text-center">Orquestrando 12 agentes especializados...</p>
        </div>

        <div id="output-area" class="space-y-6 pb-40"></div>
    </main>

    <div id="login-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center hidden z-50">
        <div class="glass p-8 rounded-2xl w-96">
            <h2 class="text-2xl font-bold mb-4">Login</h2>
            <input type="email" id="login-email" placeholder="Email" class="w-full p-3 rounded-xl bg-white/10 mb-3 text-white">
            <input type="password" id="login-password" placeholder="Senha" class="w-full p-3 rounded-xl bg-white/10 mb-4 text-white">
            <button onclick="login()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Entrar</button>
            <button onclick="closeModal()" class="w-full mt-3 text-sm opacity-70">Cancelar</button>
        </div>
    </div>

    <div id="register-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center hidden z-50">
        <div class="glass p-8 rounded-2xl w-96">
            <h2 class="text-2xl font-bold mb-4">Registrar</h2>
            <input type="email" id="reg-email" placeholder="Email" class="w-full p-3 rounded-xl bg-white/10 mb-3 text-white">
            <input type="password" id="reg-password" placeholder="Senha" class="w-full p-3 rounded-xl bg-white/10 mb-4 text-white">
            <button onclick="register()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Criar conta</button>
            <button onclick="closeModal()" class="w-full mt-3 text-sm opacity-70">Cancelar</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://jusaii-app.onrender.com"; // Altere se necessário
        let token = localStorage.getItem('token');

        function updateUI() {
            if (token) {
                document.getElementById('auth-buttons').style.display = 'none';
                document.getElementById('logout-button').style.display = 'block';
                // Buscar dados do usuário
                fetch(API_BASE + '/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } })
                    .then(res => res.json())
                    .then(data => {
                        document.getElementById('c-count').innerText = data.credits;
                        document.getElementById('p-count').innerText = data.premium_credits;
                    })
                    .catch(() => {});
            } else {
                document.getElementById('auth-buttons').style.display = 'block';
                document.getElementById('logout-button').style.display = 'none';
                document.getElementById('c-count').innerText = '0';
                document.getElementById('p-count').innerText = '0';
            }
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const res = await fetch(API_BASE + '/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (res.ok) {
                const data = await res.json();
                token = data.token;
                localStorage.setItem('token', token);
                closeModal();
                updateUI();
                alert('Login realizado!');
            } else {
                alert('Erro no login');
            }
        }

        async function register() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const res = await fetch(API_BASE + '/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (res.ok) {
                alert('Conta criada! Faça login.');
                closeModal();
            } else {
                alert('Erro ao criar conta');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            token = null;
            updateUI();
            alert('Desconectado');
        }

        function showLogin() { document.getElementById('login-modal').classList.remove('hidden'); }
        function showRegister() { document.getElementById('register-modal').classList.remove('hidden'); }
        function closeModal() { document.querySelectorAll('.fixed').forEach(m => m.classList.add('hidden')); }

        async function analisarCaso(tipo) {
            if (!token) {
                alert('Você precisa estar logado para usar o sistema.');
                showLogin();
                return;
            }
            const prompt = document.getElementById('txt-input').value.trim();
            if (!prompt) { alert('Descreva o caso.'); return; }

            const btnFree = document.getElementById('btn-free');
            const btnPremium = document.getElementById('btn-premium');
            const loader = document.getElementById('loading-box');
            const output = document.getElementById('output-area');
            const statusMsg = document.getElementById('st-msg');

            btnFree.disabled = true;
            btnPremium.disabled = true;
            loader.classList.remove('hidden');
            statusMsg.innerText = "A processar...";

            try {
                let endpoint = tipo === 'free' ? '/api/analyze' : '/api/analyze/premium';
                const res = await fetch(API_BASE + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ prompt })
                });
                if (!res.ok) throw new Error(await res.text());
                const data = await res.json();

                if (tipo === 'free') {
                    output.innerHTML = `
                        <div class="veredito-box glass p-8 rounded-2xl mb-8 fade-in-card">
                            <h2 class="text-2xl font-bold text-blue-300 mb-4">Veredito do Juiz IA</h2>
                            <div class="whitespace-pre-wrap">${data.veredito.replace(/\n/g, '<br>')}</div>
                        </div>
                        <div class="glass p-6 rounded-2xl">
                            <h3 class="text-xl font-bold text-blue-300">Amostra Gratuita</h3>
                            <p class="text-slate-300 mt-2">${data.free_analysis.replace(/\n/g, '<br>')}</p>
                            <p class="text-xs text-yellow-500 mt-4">Créditos restantes: ${data.credits_left}</p>
                        </div>
                        <p class="text-center text-sm text-slate-400 mt-4">🔓 Adquira o Relatório Premium para ver as análises completas dos 12 especialistas e baixar PDF.</p>
                    `;
                } else {
                    // Premium
                    output.innerHTML = `
                        <div class="veredito-box glass p-8 rounded-2xl mb-8 fade-in-card">
                            <div class="flex justify-between items-center">
                                <h2 class="text-2xl font-bold text-blue-300">Veredito do Juiz IA</h2>
                                <button onclick="downloadPDF(${data.analysis_id})" class="bg-green-600 px-4 py-2 rounded-xl text-sm">📄 Baixar PDF</button>
                            </div>
                            <div class="whitespace-pre-wrap mt-4">${data.veredito.replace(/\n/g, '<br>')}</div>
                        </div>
                    `;
                    data.agents.forEach((agent, idx) => {
                        const card = document.createElement('details');
                        card.setAttribute('open', idx === 0 ? 'true' : 'false');
                        card.className = "glass rounded-2xl border border-white/10 overflow-hidden fade-in-card";
                        card.innerHTML = `<summary class="p-6 font-bold cursor-pointer hover:bg-white/5 transition-colors text-blue-300">${agent.area}</summary><div class="p-6 pt-0 text-slate-300 text-sm leading-relaxed border-t border-white/10">${agent.analysis.replace(/\n/g, '<br>')}</div>`;
                        output.appendChild(card);
                    });
                }
                updateUI();
            } catch (err) {
                alert('Erro: ' + err.message);
            } finally {
                btnFree.disabled = false;
                btnPremium.disabled = false;
                loader.classList.add('hidden');
                statusMsg.innerText = "Motor Online";
            }
        }

        async function downloadPDF(analysisId) {
            const res = await fetch(API_BASE + `/api/report/pdf/${analysisId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `relatorio_${analysisId}.pdf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            } else {
                alert('Erro ao baixar PDF');
            }
        }

        // Adicionar rota /api/auth/me no backend (opcional, pode ser substituída por chamada ao /api/user)
        // Para simplificar, adicionamos um endpoint rápido no backend: /api/auth/me
        // Inclua no backend:
        // @app.route('/api/auth/me', methods=['GET'])
        // @token_required
        // def get_me(current_user):
        //     return jsonify({'credits': current_user.credits, 'premium_credits': current_user.premium_credits})

        updateUI();
    </script>
</body>
</html>
