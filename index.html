<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustAII | Law Engine v2.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .loader { border: 3px solid rgba(59, 130, 246, 0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center p-6 md:p-12 min-h-screen">

    <header class="w-full max-w-4xl flex justify-between items-center mb-12 border-b border-white/5 pb-6">
        <h1 class="text-3xl font-black italic text-blue-500 uppercase tracking-tighter text-center">JUSTAII <span class="text-[10px] text-white/20 not-italic">v2.9</span></h1>
        <div class="bg-blue-600/20 px-5 py-2 rounded-2xl border border-blue-500/30 text-[10px] font-bold">
            CRÉDITOS: <span id="c-count">--</span>
        </div>
    </header>

    <main class="w-full max-w-3xl space-y-8">
        <section class="glass p-8 rounded-[2.5rem] shadow-2xl">
            <textarea id="case-input" class="w-full h-64 bg-transparent border-none outline-none text-lg resize-none text-slate-200" placeholder="Introduza aqui os factos do caso para análise..."></textarea>
            <div class="flex flex-col md:flex-row justify-between items-center mt-6 gap-4 border-t border-white/5 pt-6">
                <span id="st-label" class="text-[10px] uppercase font-bold text-green-500 animate-pulse">Motor Pronto</span>
                <button onclick="enviar()" id="btn-run" class="w-full md:w-auto bg-blue-600 hover:bg-blue-500 text-white px-12 py-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all shadow-lg shadow-blue-600/30 active:scale-95">
                    Iniciar Orquestração
                </button>
            </div>
        </section>

        <div id="ld-box" class="hidden flex flex-col items-center py-10">
            <div class="loader mb-4"></div>
            <p class="text-[10px] uppercase tracking-[0.3em] text-blue-400 animate-pulse font-bold text-center">Orquestrando Agentes Jurídicos...</p>
        </div>

        <div id="results" class="space-y-6 pb-20"></div>
    </main>

    <script>
        // URL DO RENDER SEM PORTA :5000
        const API = "https://jusaii-app.onrender.com/api/analyze";
        
        let c = parseInt(localStorage.getItem('j_v29_c') || "5");
        const updateC = () => { document.getElementById('c-count').innerText = c; localStorage.setItem('j_v29_c', c); }
        updateC();

        async function enviar() {
            if(c <= 0) return alert("Ciclos esgotados.");
            const text = document.getElementById('case-input').value.trim();
            if(!text) return;

            const btn = document.getElementById('btn-run');
            const ld = document.getElementById('ld-box');
            const st = document.getElementById('st-label');

            btn.disabled = true;
            ld.classList.remove('hidden');
            st.innerText = "Processando...";

            try {
                const r = await fetch(API, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: text })
                });

                const d = await r.json();

                if(d.agents) {
                    c--; updateC();
                    d.agents.forEach(a => {
                        const div = document.createElement('div');
                        div.className = "glass p-10 rounded-[2.5rem] border-l-4 border-blue-600 mb-6";
                        div.innerHTML = `<h3 class="text-blue-400 font-bold mb-4 uppercase text-[10px] tracking-widest italic">${a.area}</h3>
                                         <div class="text-slate-300 text-sm leading-relaxed">${a.analysis.replace(/\n/g, '<br>')}</div>`;
                        document.getElementById('results').prepend(div);
                    });
                    document.getElementById('case-input').value = "";
                }
            } catch (e) {
                alert("O motor está a iniciar. Tente novamente em 20 segundos.");
            } finally {
                btn.disabled = false;
                ld.classList.add('hidden');
                st.innerText = "Motor Online";
            }
        }
    </script>
</body>
</html>
