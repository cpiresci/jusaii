<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustAII | Law Engine 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #020617; 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }
        .glass-panel { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .neon-border {
            position: relative;
        }
        .neon-border::after {
            content: "";
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #3b82f6, transparent);
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 0.5; }
            100% { top: 100%; opacity: 0; }
        }
        .scanning::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 2px;
            background: #3b82f6;
            left: 0;
            animation: scan 2s infinite linear;
            box-shadow: 0 0 15px #3b82f6;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-12">
    <!-- Header -->
    <header class="w-full max-w-5xl flex justify-between items-center mb-16 border-b border-white/5 pb-6">
        <div>
            <h1 class="text-3xl font-extrabold italic tracking-tighter text-blue-500 uppercase">JustAII</h1>
            <p class="text-[9px] opacity-40 uppercase tracking-[0.4em] font-bold">Mechanical Authority • Engine Active</p>
        </div>
        <div class="hidden md:flex flex-col items-end">
            <span class="text-[10px] text-green-500 font-mono animate-pulse">● SERVER_STATUS: ONLINE</span>
            <span class="text-[9px] opacity-30 uppercase font-mono tracking-widest">Llama-3.3-70B-Instruct</span>
        </div>
    </header>

    <main class="w-full max-w-4xl space-y-10">
        <!-- Input Area -->
        <section class="glass-panel rounded-[2.5rem] p-1 md:p-2">
            <div class="relative rounded-[2rem] overflow-hidden" id="inputContainer">
                <textarea id="prompt" class="w-full h-64 p-8 bg-transparent border-none outline-none text-base leading-relaxed placeholder:opacity-20 resize-none" placeholder="Descreva os factos jurídicos, datas e partes envolvidas para iniciar a orquestração dos agentes..."></textarea>
            </div>
            <div class="p-4 flex justify-end">
                <button onclick="analisar()" id="btn" class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] transition-all transform hover:scale-105 active:scale-95 shadow-lg shadow-blue-900/20">
                    Iniciar Análise
                </button>
            </div>
        </section>

        <!-- Output Area -->
        <section id="output" class="space-y-8 pb-32"></section>
    </main>

    <!-- Footer decoration -->
    <div class="fixed bottom-0 left-0 w-full h-24 bg-gradient-to-t from-[#020617] to-transparent pointer-events-none"></div>

    <script>
        // CONFIGURAÇÃO: Substitua apenas se o seu link do Render for diferente
        const API_URL = "https://jusaii.onrender.com/api/analyze";

        async function analisar() {
            const btn = document.getElementById('btn');
            const promptInput = document.getElementById('prompt');
            const inputContainer = document.getElementById('inputContainer');
            const output = document.getElementById('output');
            const prompt = promptInput.value.trim();

            if(!prompt) {
                alert("Por favor, introduza os detalhes do caso.");
                return;
            }

            // UI Feedback: Start
            btn.disabled = true;
            btn.innerText = "ORQUESTRANDO AGENTES...";
            inputContainer.classList.add('scanning');
            output.innerHTML = "";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (!response.ok) throw new Error('Servidor indisponível');

                const data = await response.json();
                
                if(data.agents && data.agents.length > 0) {
                    data.agents.forEach(a => {
                        const card = document.createElement('div');
                        card.className = "glass-panel p-10 rounded-[3rem] border-l-4 border-blue-500 transform transition-all duration-700 hover:border-l-8";
                        card.innerHTML = `
                            <div class="flex items-center justify-between mb-8 opacity-50">
                                <span class="text-[10px] font-bold uppercase tracking-[0.3em] text-blue-400">${a.area}</span>
                                <span class="text-[9px] font-mono">ID: ${Math.random().toString(16).slice(2,8).toUpperCase()}</span>
                            </div>
                            <div class="text-sm md:text-base opacity-90 leading-relaxed text-slate-200 font-light space-y-4">
                                ${a.analysis.split('\n').map(para => `<p class="mb-4">${para}</p>`).join('')}
                            </div>
                        `;
                        output.appendChild(card);
                    });
                } else {
                    throw new Error('Nenhum dado recebido');
                }
            } catch (error) {
                const errorCard = document.createElement('div');
                errorCard.className = "glass-panel p-10 rounded-[3rem] border-l-4 border-red-500 text-red-400 text-sm";
                errorCard.innerText = "ERRO NA COMUNICAÇÃO: O servidor pode estar a reiniciar. Tente novamente em 30 segundos.";
                output.appendChild(errorCard);
            } finally {
                btn.disabled = false;
                btn.innerText = "INICIAR ANÁLISE";
                inputContainer.classList.remove('scanning');
            }
        }
    </script>
</body>
</html>
