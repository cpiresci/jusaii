<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustAII | Law Engine v2.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #020617; 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            margin: 0;
        }
        .glass { 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .loader { 
            border: 3px solid rgba(59, 130, 246, 0.1); 
            border-top: 3px solid #3b82f6; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .fade-in-card {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-message {
            background: rgba(220, 38, 38, 0.2);
            border-left: 4px solid #ef4444;
            padding: 1rem;
            border-radius: 0.5rem;
            color: #fecaca;
        }
    </style>
</head>
<body class="flex flex-col items-center p-6 md:p-12">

    <header class="w-full max-w-5xl flex justify-between items-center mb-12 border-b border-white/5 pb-8">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter text-blue-500 uppercase">JustAII</h1>
            <p class="text-[9px] opacity-40 uppercase tracking-[0.4em] font-bold italic">SambaNova AI Orchestration</p>
        </div>
        <div class="bg-blue-600/20 px-6 py-2 rounded-2xl border border-blue-500/30">
            <span class="text-[10px] font-bold opacity-60 mr-2 uppercase">Ciclos Restantes:</span>
            <span id="c-count" class="font-black text-white italic text-lg">--</span>
        </div>
    </header>

    <main class="w-full max-w-4xl space-y-10">
        <section class="glass rounded-[2.5rem] p-2 relative overflow-hidden shadow-2xl">
            <textarea id="txt-input" 
                class="w-full h-72 p-10 bg-transparent border-none outline-none text-lg leading-relaxed placeholder:opacity-20 resize-none text-white" 
                placeholder="Descreva aqui os factos do caso, legislação ou dúvida jurídica para análise profunda..."></textarea>
            
            <div class="p-6 flex flex-col md:flex-row justify-between items-center border-t border-white/5 gap-4">
                <div class="flex items-center gap-2">
                    <div id="status-dot" class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span id="st-msg" class="text-[10px] uppercase font-bold text-slate-500 tracking-widest">Motor v2.9 Online</span>
                </div>
                <button onclick="analisarCaso()" id="btn-main" 
                    class="w-full md:w-auto bg-blue-600 hover:bg-blue-500 text-white px-12 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all shadow-xl shadow-blue-600/20 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    Iniciar Orquestração Jurídica
                </button>
            </div>
        </section>

        <div id="loading-box" class="hidden flex flex-col items-center py-10 space-y-4">
            <div class="loader"></div>
            <p class="text-[10px] uppercase tracking-widest text-blue-400 animate-pulse font-bold text-center">
                Agentes Jurídicos a processar fundamentação...
            </p>
        </div>

        <div id="output-area" class="space-y-6 pb-40"></div>
    </main>

    <script>
        // URL do backend (ajuste se necessário)
        const API_URL = "https://jusaii-app.onrender.com/api/analyze";

        let credits = parseInt(localStorage.getItem('justaii_credits_v29') || "5");
        
        const updateUI = () => { 
            document.getElementById('c-count').innerText = credits; 
            localStorage.setItem('justaii_credits_v29', credits); 
            
            if(credits <= 0) {
                document.getElementById('btn-main').disabled = true;
                document.getElementById('st-msg').innerText = "Ciclos Esgotados";
                document.getElementById('status-dot').classList.replace('bg-green-500', 'bg-red-500');
            } else {
                document.getElementById('btn-main').disabled = false;
                document.getElementById('st-msg').innerText = "Motor v2.9 Online";
                document.getElementById('status-dot').classList.replace('bg-red-500', 'bg-green-500');
            }
        }
        
        updateUI();

        async function analisarCaso() {
            const inputField = document.getElementById('txt-input');
            const prompt = inputField.value.trim();
            
            if(!prompt) {
                alert("Por favor, introduza os detalhes do caso para análise.");
                return;
            }

            if(credits <= 0) return;

            const btn = document.getElementById('btn-main');
            const loader = document.getElementById('loading-box');
            const statusMsg = document.getElementById('st-msg');
            const outputArea = document.getElementById('output-area');

            btn.disabled = true;
            loader.classList.remove('hidden');
            statusMsg.innerText = "A consultar agentes...";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (!response.ok) {
                    let errorMsg = `Erro do Servidor: ${response.status}`;
                    try {
                        const errorData = await response.json();
                        errorMsg = errorData.error || errorMsg;
                    } catch(e) {}
                    throw new Error(errorMsg);
                }

                const data = await response.json();

                if(data.agents && data.agents.length > 0) {
                    credits--;
                    updateUI();
                    
                    data.agents.forEach(agent => {
                        const card = document.createElement('div');
                        card.className = "glass p-10 rounded-[3rem] border-l-4 border-blue-600 fade-in-card mb-6 shadow-xl";
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-6">
                                <h3 class="text-blue-400 font-bold uppercase text-[10px] tracking-[0.2em] italic">
                                    ${agent.area || 'Análise Jurídica Orquestrada'}
                                </h3>
                                <span class="text-[8px] text-white/20 font-bold uppercase">SambaNova Llama 3.1 70B</span>
                            </div>
                            <div class="text-slate-300 text-sm leading-relaxed space-y-4">
                                ${agent.analysis.replace(/\n/g, '<br>')}
                            </div>
                        `;
                        outputArea.prepend(card);
                    });
                    
                    inputField.value = "";
                } else if (data.error) {
                    throw new Error(data.error);
                } else {
                    throw new Error("Resposta inválida da API.");
                }

            } catch (error) {
                console.error("Erro na Requisição:", error);
                // Exibe o erro de forma mais clara dentro da área de resultados
                const errorCard = document.createElement('div');
                errorCard.className = "error-message glass p-6 rounded-2xl mb-4";
                errorCard.innerHTML = `
                    <div class="flex items-start gap-3">
                        <svg class="w-5 h-5 text-red-400 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <div>
                            <p class="font-bold text-red-300">Falha na análise</p>
                            <p class="text-sm text-red-200/80">${error.message}</p>
                            <p class="text-xs text-red-300/60 mt-2">O servidor pode estar a iniciar (cold start). Aguarde alguns segundos e tente novamente.</p>
                        </div>
                    </div>
                `;
                outputArea.prepend(errorCard);
                
                // Remove a mensagem de erro após 10 segundos
                setTimeout(() => {
                    if (errorCard.parentNode) errorCard.remove();
                }, 10000);
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
                statusMsg.innerText = "Motor Online";
                updateUI();
            }
        }
    </script>
</body>
</html>
