<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustAII | Autoridade Mecânica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 50% { opacity: 0.5; } 100% { top: 100%; opacity: 0; } }
        .scanning::after { content: ""; position: absolute; width: 100%; height: 2px; background: #3b82f6; left: 0; animation: scan 2s infinite linear; box-shadow: 0 0 15px #3b82f6; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 md:p-12">
    <header class="w-full max-w-5xl flex justify-between items-center mb-16 border-b border-white/5 pb-6">
        <div>
            <h1 class="text-3xl font-extrabold italic tracking-tighter text-blue-500 uppercase">JustAII</h1>
            <p class="text-[9px] opacity-40 uppercase tracking-[0.4em] font-bold">Mechanical Authority • Engine Active</p>
        </div>
        <div class="text-right">
            <span class="text-[10px] text-green-500 font-mono animate-pulse">● STATUS: ONLINE</span>
        </div>
    </header>

    <main class="w-full max-w-4xl space-y-10">
        <section class="glass-panel rounded-[2.5rem] p-2">
            <div class="relative rounded-[2rem] overflow-hidden bg-slate-900/50" id="inputContainer">
                <textarea id="prompt" class="w-full h-64 p-8 bg-transparent border-none outline-none text-base leading-relaxed placeholder:opacity-20 resize-none" placeholder="Descreva os factos jurídicos para análise..."></textarea>
            </div>
            <div class="p-4 flex justify-end">
                <button onclick="analisar()" id="btn" class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] transition-all transform active:scale-95">
                    Iniciar Análise
                </button>
            </div>
        </section>
        <section id="output" class="space-y-8 pb-32"></section>
    </main>

    <script>
        // ENDEREÇO CORRIGIDO (Baseado na sua imagem 1000251662)
        const API_URL = "https://jusaii-app.onrender.com/api/analyze";

        async function analisar() {
            const btn = document.getElementById('btn');
            const container = document.getElementById('inputContainer');
            const output = document.getElementById('output');
            const prompt = document.getElementById('prompt').value.trim();

            if(!prompt) return alert("Introduza os factos do caso.");

            btn.disabled = true;
            btn.innerText = "A ORQUESTRAR AGENTES...";
            container.classList.add('scanning');
            output.innerHTML = "";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();
                
                if(data.agents) {
                    data.agents.forEach(a => {
                        const card = document.createElement('div');
                        card.className = "glass-panel p-10 rounded-[3rem] border-l-4 border-blue-500 animate-in fade-in slide-in-from-bottom-4 duration-700";
                        card.innerHTML = `
                            <h3 class="text-blue-400 font-bold mb-6 text-xs uppercase tracking-widest">${a.area}</h3>
                            <div class="text-sm md:text-base opacity-90 leading-relaxed text-slate-200">
                                ${a.analysis.replace(/\n/g, '<br>')}
                            </div>
                        `;
                        output.appendChild(card);
                    });
                } else if (data.error) {
                    throw new Error(data.error);
                }
            } catch (error) {
                const errCard = document.createElement('div');
                errCard.className = "glass-panel p-10 rounded-[3rem] border-l-4 border-red-500 text-red-400 text-sm";
                errCard.innerHTML = `<strong>ERRO DE LIGAÇÃO:</strong> O motor SambaNova no Render está a acordar ou o link está incorrecto. Tente novamente em 20 segundos.`;
                output.appendChild(errCard);
            } finally {
                btn.disabled = false;
                btn.innerText = "INICIAR ANÁLISE";
                container.classList.remove('scanning');
            }
        }
    </script>
</body>
</html>
