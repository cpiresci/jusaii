<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustAII | Motor Jurídico Autónomo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .credit-badge { background: linear-gradient(90deg, #1e3a8a, #3b82f6); border: 1px solid #60a5fa; }
        .modal-bg { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(10px); }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 50% { opacity: 0.5; } 100% { top: 100%; opacity: 0; } }
        .scanning::after { content: ""; position: absolute; width: 100%; height: 2px; background: #3b82f6; left: 0; animation: scan 2s infinite linear; box-shadow: 0 0 15px #3b82f6; }
        .locked { filter: grayscale(100%) blur(2px); pointer-events: none; opacity: 0.5; }
    </style>
</head>
<body class="flex flex-col items-center p-6 md:p-12 relative">

    <!-- Header com Sistema de Créditos -->
    <header class="w-full max-w-5xl flex justify-between items-center mb-16 border-b border-white/5 pb-6">
        <div>
            <h1 class="text-3xl font-extrabold italic tracking-tighter text-blue-500 uppercase">JustAII</h1>
            <p class="text-[9px] opacity-40 uppercase tracking-[0.4em] font-bold">Mechanical Authority</p>
        </div>
        <div class="flex items-center gap-4">
            <span id="server-status" class="text-[10px] text-green-500 font-mono hidden md:inline animate-pulse">● ENGINE ONLINE</span>
            <div class="credit-badge px-4 py-2 rounded-full flex items-center gap-2 shadow-lg shadow-blue-500/20">
                <span class="text-[10px] font-bold uppercase tracking-widest">Créditos:</span>
                <span id="credit-count" class="font-black text-white text-sm">--</span>
            </div>
        </div>
    </header>

    <main class="w-full max-w-4xl space-y-10">
        <!-- Input Section -->
        <section class="glass-panel rounded-[2.5rem] p-2 transition-all duration-500" id="main-panel">
            <div class="relative rounded-[2rem] overflow-hidden bg-slate-900/50" id="inputContainer">
                <textarea id="prompt" class="w-full h-64 p-8 bg-transparent border-none outline-none text-base leading-relaxed placeholder:opacity-20 resize-none" placeholder="Descreva os factos jurídicos do caso para orquestração..."></textarea>
            </div>
            <div class="p-4 flex justify-between items-center">
                <span class="text-[10px] text-slate-400 font-mono ml-4" id="cost-info">Custo: 1 Crédito por Análise</span>
                <button onclick="analisar()" id="btn" class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] transition-all transform active:scale-95 shadow-lg shadow-blue-600/20">
                    Iniciar Orquestração
                </button>
            </div>
        </section>

        <!-- Results Section -->
        <section id="output" class="space-y-8 pb-32"></section>
    </main>

    <!-- Paywall Modal (Escondido por padrão) -->
    <div id="paywall-modal" class="fixed inset-0 modal-bg z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="glass-panel p-10 rounded-[3rem] max-w-md w-full text-center border-t-4 border-blue-500 transform scale-95 transition-transform duration-300" id="paywall-content">
            <div class="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-2xl font-black mb-2 text-white">Créditos Esgotados</h2>
            <p class="text-sm text-slate-300 mb-8 leading-relaxed">Atingiu o limite do seu teste gratuito. Recarregue a sua conta para continuar a usar o Motor Jurídico JustAII.</p>
            
            <div class="space-y-4">
                <!-- Botões de Compra -->
                <!-- No futuro, substitua 'link_do_stripe_pacote_1' pelo link real do Stripe ou Mercado Pago -->
                <button onclick="comprarCreditos(10, 'link_do_stripe_pacote_1')" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all shadow-lg shadow-blue-600/20">
                    10 Análises - R$ 49,90
                </button>
                <button onclick="comprarCreditos(50, 'link_do_stripe_pacote_2')" class="w-full bg-slate-800 hover:bg-slate-700 text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all border border-slate-700">
                    50 Análises - R$ 199,90
                </button>
            </div>
            <button onclick="fecharPaywall()" class="mt-6 text-[10px] text-slate-500 uppercase tracking-widest hover:text-white transition-colors">Voltar</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DA API NO RENDER
        const API_URL = "https://jusaii-app.onrender.com/api/analyze";
        
        // --- 1. SISTEMA DE CRÉDITOS ---
        let creditos = parseInt(localStorage.getItem('jusaii_creditos'));
        
        // Se for a primeira vez do utilizador, dar 2 créditos grátis de teste
        if (isNaN(creditos)) {
            creditos = 2;
            salvarCreditos(creditos);
        }

        // Lógica que verifica se o cliente acabou de voltar de um pagamento com sucesso
        verificarRetornoDePagamento();

        // Atualizar interface visual logo ao abrir
        atualizarUI();

        function salvarCreditos(valor) {
            creditos = valor;
            localStorage.setItem('jusaii_creditos', creditos);
            atualizarUI();
        }

        function atualizarUI() {
            document.getElementById('credit-count').innerText = creditos;
            const painel = document.getElementById('main-panel');
            
            // Se os créditos forem 0 ou menos, bloqueia o ecrã
            if (creditos <= 0) {
                painel.classList.add('locked');
                mostrarPaywall();
            } else {
                painel.classList.remove('locked');
            }
        }

        // --- 2. LÓGICA DE ORQUESTRAÇÃO (A API SÓ É CHAMADA SE HOUVER CRÉDITOS) ---
        async function analisar() {
            if (creditos <= 0) {
                mostrarPaywall();
                return;
            }

            const btn = document.getElementById('btn');
            const container = document.getElementById('inputContainer');
            const output = document.getElementById('output');
            const prompt = document.getElementById('prompt').value.trim();

            if(!prompt) return alert("Por favor, introduza os factos do caso.");

            // Interface em carregamento
            btn.disabled = true;
            btn.innerText = "A PROCESSAR (-1 CRÉDITO)...";
            container.classList.add('scanning');
            output.innerHTML = "";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (!response.ok) throw new Error('O motor SambaNova está a reiniciar. Tente em 20 segundos.');

                const data = await response.json();
                
                if(data.agents) {
                    // SUCESSO! A API respondeu, vamos descontar 1 crédito do utilizador
                    salvarCreditos(creditos - 1);

                    // Mostrar o Veredito no ecrã
                    data.agents.forEach(a => {
                        const card = document.createElement('div');
                        card.className = "glass-panel p-10 rounded-[3rem] border-l-4 border-blue-500 mb-6";
                        card.innerHTML = `
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-blue-400 font-bold text-xs uppercase tracking-widest">${a.area}</h3>
                            </div>
                            <div class="text-sm md:text-base opacity-90 leading-loose text-slate-200">
                                ${a.analysis.split('\n').map(p => `<p class="mb-4">${p}</p>`).join('')}
                            </div>
                        `;
                        output.appendChild(card);
                    });
                }
            } catch (error) {
                // Se der erro de Cold Start no Render, avisamos e NÃO descontamos o crédito
                const errCard = document.createElement('div');
                errCard.className = "glass-panel p-8 rounded-3xl border-l-4 border-yellow-500 text-yellow-400 text-sm";
                errCard.innerHTML = `<strong>AVISO:</strong> ${error.message} O seu crédito NÃO foi descontado.`;
                output.appendChild(errCard);
            } finally {
                btn.disabled = false;
                btn.innerText = "INICIAR ORQUESTRAÇÃO";
                container.classList.remove('scanning');
